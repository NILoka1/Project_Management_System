appId: com.nikolay.coursework2
productName: CourseWork2
copyright: © 2025 Nikolay

directories:
  output: release
  buildResources: build

files:
  - dist/desktop/main.js
  - dist/client/**/*
  - package.json

extraResources:
  - from: dist/client
    to: client

win:
  target: nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CourseWork2
