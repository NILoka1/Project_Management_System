version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracker_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


  server:
    build: .
    container_name: tracker-server
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tracker_db?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-this
      NODE_ENV: development
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./seed-demo-data.js:/app/seed-demo-data.js  # Добавьте эту строку
    command: >
      sh -c "
        npx prisma migrate dev --name init &&
        node seed-demo-data.js &&
        node src/index.js
      "
volumes:
  postgres_data: